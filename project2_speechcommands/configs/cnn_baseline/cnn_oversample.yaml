model_name: "cnn_baseline"
data_root: "project2_speechcommands/data"
checkpoint_dir: "project2_speechcommands/runs"
project_name: "speechcommands"
run_name: "cnn_oversample"

balance:
  strategy: "oversample"
  oversample_target_ratio: 0.5

# lr and batch_size: update to best values found from lr/bs sweep above
training:
  lr: 0.001
  batch_size: 64
  num_epochs: 60
  weight_decay: 0.0001
  dropout: 0.1
  num_workers: 4
  patience: 10
