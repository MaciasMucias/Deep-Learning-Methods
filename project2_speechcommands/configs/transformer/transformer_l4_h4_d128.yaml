model_name: "transformer"
data_root: "project2_speechcommands/data"
checkpoint_dir: "project2_speechcommands/runs"
project_name: "speechcommands"
run_name: "transformer_l4_h4_d128"

transformer:
  embed_dim: 128
  n_heads: 4
  n_layers: 4
  mlp_ratio: 4.0
  dropout: 0.1

training:
  lr: 0.001
  batch_size: 64
  num_epochs: 60
  weight_decay: 0.0001
  dropout: 0.1
  num_workers: 4
  patience: 10
